[flake8]
max-line-length = 100

[tox]
skipsdist = True
skip_missing_interpreters = True
envlist = fmt, lint

[vars]
all_path = {[vars]src_path} {[vars]tst_path}
src_path = {toxinidir}/resource_dispatcher
tst_path = {toxinidir}/resource_dispatcher/tests/

[testenv]
passenv =
    PYTHONPATH
    CHARM_BUILD_DIR
    MODEL_SETTINGS
    KUBECONFIG
setenv =
    PYTHONPATH = {toxinidir}:{toxinidir}/lib:{[vars]src_path}
    PYTHONBREAKPOINT=ipdb.set_trace
    PY_COLORS=1
deps =
    poetry>=2.1.3

[testenv:update-requirements]
commands =
    # Update the locked dependencies for all groups.
    poetry lock --regenerate
description = Update the poetry lock file
skip_install = true

[testenv:fmt]
commands =
    isort {[vars]all_path}
    black {[vars]all_path}
commands_pre =
    poetry install --only fmt
description = Apply coding style standards to code
skip_install = true

[testenv:lint]
commands =
    # uncomment the following line if this charm owns a lib
    # codespell {[vars]lib_path}
    codespell {toxinidir}/. --skip {toxinidir}/./.git --skip {toxinidir}/./.tox \
      --skip {toxinidir}/./build --skip {toxinidir}/./lib --skip {toxinidir}/./venv \
      --skip {toxinidir}/./.mypy_cache \
      --skip {toxinidir}/./icon.svg --skip *.json.tmpl --skip *.lock
    # pflake8 wrapper supports config from pyproject.toml
    pflake8 {[vars]src_path}
    isort --check-only --diff {[vars]all_path}
    black --check --diff {[vars]all_path}
commands_pre =
    poetry install --only lint
description = Check code against coding style standards
skip_install = true

[testenv:unit]
commands =
    coverage run --source={[vars]src_path} \
        -m pytest --ignore={[vars]tst_path}integration -vv --tb native {posargs}
    coverage report
commands_pre =
    poetry install --only main,unit
description = Run unit tests
skip_install = true

[testenv:integration]
commands = pytest -vv --tb native --log-cli-level=INFO -s {posargs}
commands_pre =
    poetry install --only main,integration
description = Run integration tests
skip_install = true